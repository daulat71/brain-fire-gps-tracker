name: Build Android APK

on:
  workflow_dispatch:

# यहाँ पूरे वर्कफ़्लो के लिए Node.js 24 को फ़ोर्स किया गया है ताकि चेतावनी (Warning) आना बंद हो जाए
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4.4.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libffi-dev xclip libx11-dev libxft-dev libasound2-dev libpulse-dev
        pip install --upgrade pip setuptools virtualenv
        pip install "cython<3.0.0" "buildozer==1.5.0"

    - name: Build with Buildozer
      run: |
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        yes | buildozer android debug
      env:
        ACCEPT_ANDROID_SDK_LICENSES: "y"

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: GPS-Tracker-App
        path: bin/*.apk
