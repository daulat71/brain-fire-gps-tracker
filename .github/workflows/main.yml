name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # 👈 स्थिरता के लिए एक फिक्स उबंटू वर्जन सेट किया

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libffi-dev xclip libx16-dev libxft-dev libffi7
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer # 👈 Cython का पुराना स्थिर वर्जन ताकि एरर न आए

    - name: Build APK with Buildozer
      run: |
        # यहाँ हम बिल्डोज़र को बिना रूट वार्निंग के सीधे रन कर रहे हैं
        buildozer android debug
      env:
        ACCEPT_ANDROID_SDK_LICENSES: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
