name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # Node.js की चेतावनी और एरर को रोकने के लिए
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libffi-dev xclip libx11-dev libxft-dev libasound2-dev libpulse-dev
        pip install --upgrade pip setuptools virtualenv
        pip install "cython<3.0.0" buildozer

    - name: Build with Buildozer
      run: |
        #repositories.cfg की समस्या ठीक करने के लिए
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        yes | buildozer android debug
      env:
        ACCEPT_ANDROID_SDK_LICENSES: "y"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-GPS-App
        path: bin/*.apk
