name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        # पूरी तरह क्लीन और जांची हुई डिपेंडेंसी लिस्ट
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-venv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libffi-dev xclip libx11-dev libxft-dev libasound2-dev libpulse-dev build-essential ccache patch libltdl-dev libunwind-dev
        
        pip install --upgrade pip setuptools wheel virtualenv
        pip install "cython==0.29.33" "buildozer==1.5.0" sh pathspec

    - name: Build with Buildozer
      run: |
        # पुराना कैशे साफ़ करके नए सिरे से कंपाइल करना ताकि पुराना एरर न आए
        buildozer android clean
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        buildozer --verbose android debug
      env:
        ACCEPT_ANDROID_SDK_LICENSES: "y"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-App
        path: bin/*.apk
