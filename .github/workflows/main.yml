name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकआउट करना (अपडेटेड v5)
    - name: Checkout code
      uses: actions/checkout@v5

    # 2. जावा सेटअप करना (अपडेटेड v5)
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. पाइथन सेटअप करना (अपडेटेड v6 जो Node 24 को सपोर्ट करता है)
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 4. जरूरी टूल्स और डिपेंडेंसीज इंस्टॉल करना
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev build-essential ffmpeg
        python -m pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    # 5. APK बिल्ड करना
    - name: Build with Buildozer
      run: |
        buildozer android debug

    # 6. बनने के बाद APK को गिटहब पर अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-APK
        path: bin/*.apk
