name: Flutter Build APK

# यह कब चलेगा: जब आप खुद बटन दबाएंगे (workflow_dispatch) या जब कोड पुश करेंगे
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड को GitHub Runner पर लाना
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java (JDK) सेटअप करना जो Android के लिए ज़रूरी है
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Flutter को सेटअप करना
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # आप अपना वर्शन यहाँ बदल सकते हैं
          channel: 'stable'

      # 4. ज़रूरी पैकेजेस डाउनलोड करना
      - name: Install dependencies
        run: flutter pub get

      # 5. Android APK बनाना
      - name: Build APK
        run: flutter build apk --release

      # 6. बनने के बाद APK को डाउनलोड करने के लिए उपलब्ध कराना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
