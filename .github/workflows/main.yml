name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकआउट करना
    - name: Checkout code
      uses: actions/checkout@v5

    # 2. जावा सेट अप करना (Java 17 अनिवार्य है)
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. पाइथन सेट अप करना
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 4. जरूरी टूल्स और डिपेंडेंसीज इंस्टॉल करना
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev build-essential ffmpeg autoconf automake libtool ccache
        python -m pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    # 5. गिटहब के सिस्टम पाथ को ब्लॉक करके सीधा फ्रेश APK बिल्ड करना
    - name: Build with Buildozer (Environment Overridden)
      env:
        # यहाँ हम गिटहब के सारे डिफॉल्ट NDK रास्तों को हमेशा के लिए ब्लॉक कर रहे हैं
        ANDROID_NDK: ""
        ANDROID_NDK_ROOT: ""
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_LATEST_HOME: ""
        ANDROID_HOME: ""
      run: |
        # गिटहब के सिस्टम वाले NDK को हार्ड-डिलीट करना ताकि कोई कनफ्लिक्ट न बचे
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        
        # फ्रेश और साफ-सुथरा बिल्ड
        buildozer android debug

    # 6. APK को गिटहब पर अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-APK
        path: bin/*.apk
