name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # आधुनिक टूल्स के लिए पायथन 3.11

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-venv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libffi-dev xclip libx11-dev libxft-dev libasound2-dev libpulse-dev build-essential ccache patch libltdl-dev libunwind-dev
        
        pip install --upgrade pip setuptools wheel virtualenv
        # नए कंपाइलर के लिए Cython 3.0.x का होना आवश्यक है
        pip install "cython>=3.0.0" "buildozer>=1.5.0" sh pathspec

    - name: Build with Buildozer
      run: |
        # पुराने किसी भी खराब कैशे को डिलीट करना
        rm -rf .buildozer/
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        buildozer --verbose android debug
      env:
        ACCEPT_ANDROID_SDK_LICENSES: "y"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-App
        path: bin/*.apk
