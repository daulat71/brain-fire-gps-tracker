name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकआउट करना
    - name: Checkout code
      uses: actions/checkout@v5

    # 2. जावा सेट अप करना (Java 17)
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. पाइथन सेट अप करना
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 4. जरूरी डिपेंडेंसीज इंस्टॉल करना
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev build-essential ffmpeg autoconf automake libtool ccache
        python -m pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    # 5. पुराने कॉन्फ्लिक्ट्स और आधी अधूरी फाइल्स को वाइप करना
    - name: Clean Conflicted Tools
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
        # पुराने टूटे हुए r25b बिल्ड आर्किटेक्चर को साफ़ करना ताकि नया r26b फ्रेश कंपाइल हो
        rm -rf .buildozer/android/platform/build-*

    # 6. ओवरराइड एनवायरनमेंट के साथ फ्रेश APK बिल्ड करना
    - name: Build with Buildozer
      env:
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_LATEST_HOME: ""
        ANDROID_NDK_ROOT: ""
        ANDROID_NDK: ""
        ANDROID_HOME: ""
      run: |
        buildozer android debug

    # 7. APK को गिटहब पर अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-APK
        path: bin/*.apk
