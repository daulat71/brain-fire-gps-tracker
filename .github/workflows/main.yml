name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकआउट करना
    - name: Checkout code
      uses: actions/checkout@v5

    # 2. जावा सेट अप करना (Java 17 अनिवार्य है)
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. पाइथन सेट अप करना
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 4. जरूरी डिपेंडेंसीज इंस्टॉल करना
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev build-essential ffmpeg auto-conf automake libtool
        python -m pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    # 5. गिटहब के डिफ़ॉल्ट टूटे हुए रास्ते साफ करना
    - name: Clear GitHub Default NDK Path
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
        echo "ANDROID_NDK=" >> $GITHUB_ENV

    # 6. सीधा फ्रेश APK बिल्ड करना
    - name: Build with Buildozer
      run: |
        buildozer android debug

    # 7. APK को गिटहब पर अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-APK
        path: bin/*.apk
