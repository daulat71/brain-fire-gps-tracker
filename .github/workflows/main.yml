name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकआउट करना
    - name: Checkout code
      uses: actions/checkout@v5

    # 2. जावा सेट अप करना (Java 17 अनिवार्य है)
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. पाइथन सेट अप करना
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 4. जरूरी टूल्स और डिपेंडेंसीज इंस्टॉल करना
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev build-essential ffmpeg autoconf automake libtool ccache
        python -m pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    # 5. गिटहब के सिस्टम पाथ को बिल्डोज़र से पूरी तरह अलग करना
    - name: Isolated Build with Buildozer
      run: |
        # गिटहब के सिस्टम NDK को पूरी तरह डिलीट करना
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        
        # लोकल एनवायरनमेंट वेरिएबल्स सेट करके सीधे बिल्ड रन करना
        export ANDROID_NDK_ROOT=""
        export ANDROID_NDK_HOME=""
        export ANDROID_NDK_LATEST_HOME=""
        export ANDROID_HOME=""
        
        # पूरी तरह फ्रेश और आइसोलेटेड बिल्ड
        buildozer android debug
        
    # 6. APK को गिटहब पर अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPS-Tracker-APK
        path: bin/*.apk
