name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4.4.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        # Ubuntu 24 के लिए आवश्यक अतिरिक्त कंपाइलर और टूल्स जोड़े गए हैं
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libffi-dev xclip libx11-dev libxft-dev libasound2-dev libpulse-dev build-essential ccache pathspec
        pip install --upgrade pip setuptools virtualenv
        # बिल्ड फेल होने से बचाने के लिए Cython और Buildozer का परफेक्ट कॉम्बिनेशन
        pip install "cython<3.0.0" "buildozer==1.5.0" "sh"

    - name: Build with Buildozer
      run: |
        # पुराने टूल्स के वेरिएबल्स को हटाना
        export ANDROID_NDK_ROOT=""
        export ANDROID_NDK_HOME=""
        
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        
        # पुराना कचरा (कैरप्टेड कैशे) साफ़ करना ताकि नई रेसिपी सही से बने
        buildozer android clean
        
        # बिना अटके पूरी डिटेल्स के साथ एंड्रॉइड डीबग बिल्ड शुरू करना
        buildozer --verbose android debug
      env:
        ACCEPT_ANDROID_SDK_LICENSES: "y"

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: GPS-Tracker-App
        path: bin/*.apk
